<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Login</title>
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>
<body>
  <div class="container">
    <h1>Student Login</h1>
    <p class="muted">Enter your details to log in.</p>

    <div class="card">
      <form id="loginForm">
        <div class="row">
          <div>
            <label for="loginName">Full Name *</label>
            <input id="loginName" name="loginName" required />
          </div>
          <div>
            <label for="loginContact">Contact *</label>
            <input id="loginContact" name="loginContact" type="text" placeholder="Email or Phone" required />
          </div>
        </div>
        <div class="row">
          <div>
            <label for="loginPassword">Password *</label>
            <input id="loginPassword" name="loginPassword" type="password" required />
          </div>
        </div>
        <button type="submit">Login</button>
      </form>

      <!-- Sign Up Button -->
      <button id="signupBtn" class="secondary-btn">Go to Sign Up</button>
    </div>
  </div>
</body>
</html>
