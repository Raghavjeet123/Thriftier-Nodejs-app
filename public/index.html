<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Login</title>
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>
<body>
  <div class="container">
    <h1>Student Login</h1>
    <p class="muted">Log in to your account</p>

    <div class="card">
      <form id="loginForm">
        <div class="row">
          <div>
            <label for="loginName">Full Name *</label>
            <input id="loginName" name="loginName" required />
          </div>
          <div>
            <label for="loginContact">Email or Phone *</label>
            <input id="loginContact" name="loginContact" type="text" required />
          </div>
        </div>

        <div class="row">
          <div style="width:100%;">
            <label for="loginPassword">Password *</label>
            <div style="position:relative;">
              <input id="loginPassword" name="loginPassword" type="password" required />
              <button type="button" id="togglePassword" 
                style="position:absolute; right:10px; top:50%; transform:translateY(-50%);
                padding:4px 8px; font-size:12px; cursor:pointer;">
                Show
              </button>
            </div>
          </div>
        </div>

        <button type="submit">Login</button>
      </form>

      <button id="signupBtn" class="secondary-btn">Create Account</button>
    </div>
  </div>
</body>
</html>
